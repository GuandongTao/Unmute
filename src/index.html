<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unmute</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="setup-screen" style="display: none;">
    <div id="setup-content">
      <h2>Welcome to Unmute</h2>
      <p>Download the speech recognition engine and model to get started.</p>

      <div id="setup-items">
        <div class="setup-item">
          <span>Speech engine (CPU)</span>
          <span class="setup-size">~15 MB</span>
        </div>
        <div class="setup-item">
          <label><input type="checkbox" id="cuda-check" checked> Speech engine (NVIDIA GPU)</label>
          <span class="setup-size">~200 MB</span>
        </div>
        <div class="setup-item">
          <span>Language model (large-v3-turbo)</span>
          <span class="setup-size">~1.6 GB</span>
        </div>
      </div>

      <div id="setup-progress" style="display: none;">
        <div id="setup-status-text">Preparing...</div>
        <div id="progress-bar-bg">
          <div id="progress-bar-fill"></div>
        </div>
        <div id="progress-detail"></div>
      </div>

      <button id="setup-btn">Download &amp; Set Up</button>
      <div id="setup-error" style="display: none;"></div>
    </div>
  </div>

  <div id="app" style="display: none;">
    <div id="status-section">
      <div id="status-indicator" class="idle"></div>
      <span id="status-text">Idle</span>
    </div>

    <div id="settings-section">
      <h3>Settings</h3>

      <div class="setting-row">
        <label for="asr-model-select">ASR Model</label>
        <select id="asr-model-select"></select>
      </div>

      <div class="setting-row">
        <label for="asr-device-select">ASR Device</label>
        <select id="asr-device-select">
          <option value="cpu">CPU</option>
          <option value="gpu">GPU (CUDA)</option>
        </select>
      </div>

      <div class="setting-row">
        <label for="cleanup-mode-select">Cleanup Mode</label>
        <select id="cleanup-mode-select">
          <option value="off">Off</option>
          <option value="light">Light</option>
          <option value="rewrite">Rewrite</option>
        </select>
      </div>

      <div class="setting-row">
        <label for="cleanup-model-select">Cleanup Model</label>
        <select id="cleanup-model-select"></select>
      </div>

      <button id="save-btn">Save Settings</button>
      <span id="save-status"></span>
    </div>

    <div id="info-section">
      <div class="info-row"><span>Hold:</span> <span>Left Alt + Right Ctrl</span></div>
      <div class="info-row"><span>Toggle:</span> <span>Left Alt + Right Ctrl + Right Shift</span></div>
    </div>

    <div id="transcript-section">
      <h3>Transcript History</h3>
      <div id="transcript-list"></div>
    </div>
  </div>

  <script type="module" src="app.ts"></script>
</body>
</html>
