<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #pill {
      height: 14px;
      border-radius: 7px;
      background: rgba(74, 222, 128, 0.25);
      transition: background-color 0.2s ease, width 0.3s ease;
      width: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      overflow: hidden;
    }
    #pill.recording {
      background: rgba(74, 222, 128, 0.75);
      width: 60px;
    }
    #pill.processing {
      background: rgba(250, 204, 21, 0.75);
      width: 60px;
    }
    #pill.error {
      background: rgba(239, 68, 68, 0.75);
      width: 60px;
    }
    #pill.done {
      background: rgba(74, 222, 128, 0.75);
      width: 160px;
    }
    #timing {
      font-family: Consolas, monospace;
      font-size: 9px;
      color: rgba(0, 0, 0, 0.7);
      line-height: 14px;
      display: none;
    }
    #pill.done #timing {
      display: block;
    }
    #device-label {
      font-family: Consolas, monospace;
      font-size: 8px;
      color: rgba(255, 255, 255, 0.8);
      line-height: 14px;
      letter-spacing: 2px;
      display: block;
    }
    #pill.recording #device-label,
    #pill.processing #device-label,
    #pill.done #device-label,
    #pill.error #device-label {
      display: none;
    }
  </style>
</head>
<body>
  <div id="pill">
    <span id="device-label"></span>
    <span id="timing"></span>
  </div>
</body>
</html>
