<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #pill {
      height: 14px;
      border-radius: 7px;
      background: #4ade80;
      opacity: 0.25;
      transition: opacity 0.2s ease, background-color 0.2s ease, width 0.3s ease;
      width: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      overflow: hidden;
    }
    #pill.recording {
      background: #4ade80;
      opacity: 0.75;
    }
    #pill.processing {
      background: #facc15;
      opacity: 0.75;
    }
    #pill.error {
      background: #ef4444;
      opacity: 0.75;
    }
    #pill.done {
      background: #4ade80;
      opacity: 0.75;
      width: 160px;
    }
    #timing {
      font-family: Consolas, monospace;
      font-size: 9px;
      color: rgba(0, 0, 0, 0.7);
      line-height: 14px;
      display: none;
    }
    #pill.done #timing {
      display: block;
    }
  </style>
</head>
<body>
  <div id="pill">
    <span id="timing"></span>
  </div>
</body>
</html>
